version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: doctor_booking_mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: doctor_booking
      MYSQL_ROOT_HOST: '%'   # ✅ QUAN TRỌNG: cho phép connect từ bên ngoài

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data: